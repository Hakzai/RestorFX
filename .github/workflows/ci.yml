name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    ## For default runner usage
    # runs-on: ubuntu-latest
    ## For self-hosted runner usage
    runs-on: self-hosted


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Liberica Full JDK with JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '8'
          java-package: 'jdk+fx'
          cache: maven

      - name: Build
        run: mvn -B clean verify