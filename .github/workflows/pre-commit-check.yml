name: Pre-Commit Quality Gate

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (Liberica Full JDK with JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '8'
          java-package: 'jdk+fx'
          cache: maven

      - name: Check for forbidden patterns
        run: |
          echo "Checking architecture violations..."

          # Exemplo simples (pode evoluir)
          if grep -r "System.out.println" src/; then
            echo "❌ Forbidden logging detected"
            exit 1
          fi

      - name: Check layered architecture (basic)
        run: |
          echo "Checking for repository usage outside repository layer..."